{% extends 'base_dashboard.html' %}
{% block title %}Send Notification | CPAS{% endblock %}
{% block dashboard_content %}
<div class="container py-4" style="max-width:650px;">
  <div class="d-flex align-items-center mb-4 gap-3">
    <a href="{% url 'notifications:notification_list' %}" class="btn btn-light rounded-circle shadow-sm" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;"><i class="bi bi-arrow-left"></i></a>
    <h2 class="fw-bold mb-0">Send Notification</h2>
  </div>
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
      <form method="post" id="notify-form">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label fw-medium">Title</label><input type="text" name="title" class="form-control" required placeholder="Notification title..."></div>
        <div class="mb-3"><label class="form-label fw-medium">Message</label><textarea name="message" class="form-control" rows="4" required placeholder="Write your message..."></textarea></div>
        <div class="mb-3">
          <label class="form-label fw-medium">Send To</label>
          <div class="d-flex gap-3 flex-wrap">
            <div class="form-check"><input type="radio" name="target_type" value="all" class="form-check-input" id="all" onchange="toggleTarget(this.value)"><label for="all" class="form-check-label">All Users</label></div>
            <div class="form-check"><input type="radio" name="target_type" value="role" class="form-check-input" id="role" onchange="toggleTarget(this.value)" checked><label for="role" class="form-check-label">By Role</label></div>
            <div class="form-check"><input type="radio" name="target_type" value="user" class="form-check-input" id="usr" onchange="toggleTarget(this.value)"><label for="usr" class="form-check-label">Specific User</label></div>
          </div>
        </div>
        <div id="role-select" class="mb-3">
          <label class="form-label fw-medium">Role</label>
          <select name="role_target" class="form-select">
            {% for val, label in roles %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
          </select>
        </div>
        <div id="user-select" class="mb-3" style="display:none;">
          <label class="form-label fw-medium">User</label>
          <select name="recipient_id" class="form-select">
            {% for u in users %}<option value="{{ u.pk }}">{{ u.get_full_name|default:u.email }} ({{ u.get_role_display }})</option>{% endfor %}
          </select>
        </div>
        <div class="d-flex gap-3 justify-content-end mt-4 pt-3 border-top">
          <a href="{% url 'notifications:notification_list' %}" class="btn btn-light rounded-pill px-4">Cancel</a>
          <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm"><i class="bi bi-send me-2"></i>Send</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function toggleTarget(val) {
  document.getElementById('role-select').style.display = val === 'role' ? '' : 'none';
  document.getElementById('user-select').style.display = val === 'user' ? '' : 'none';
}
</script>
{% endblock %}
