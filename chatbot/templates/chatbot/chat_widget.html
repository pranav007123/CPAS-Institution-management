<div id="chat-widget" class="fixed bottom-4 right-4 z-50">
    <!-- Chat Widget HTML Structure -->
    <div id="chat-header" class="bg-blue-600 text-white p-3 rounded-t-lg">
        College Assistant
    </div>
    <div id="chat-body" class="bg-white border p-3 h-64 overflow-y-auto">
        <!-- Messages go here -->
    </div>
    <div id="chat-input-container" class="border-t p-2 bg-gray-50 flex">
        <input type="text" id="chat-input" class="flex-grow border rounded-l-lg p-1" placeholder="Type a message...">
        <button id="chat-send" class="bg-blue-600 text-white p-1 rounded-r-lg px-3">Send</button>
    </div>
</div>
