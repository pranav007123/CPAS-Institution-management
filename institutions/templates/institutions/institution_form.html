{% extends 'base_dashboard.html' %}
{% block title %}{{ title }} | CPAS{% endblock %}
{% block dashboard_content %}
<div class="container py-4" style="max-width:700px;">
  <div class="d-flex align-items-center mb-4 gap-3">
    <a href="{% url 'institutions:institution_list' %}" class="btn btn-light rounded-circle shadow-sm" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;"><i class="bi bi-arrow-left"></i></a>
    <h2 class="fw-bold mb-0">{{ title }}</h2>
  </div>
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-medium">Institution Name</label><input type="text" name="name" class="form-control" required value="{{ institution.name|default:'' }}" placeholder="e.g., Marian Engineering College"></div>
          <div class="col-md-6"><label class="form-label fw-medium">Code</label><input type="text" name="code" class="form-control" required value="{{ institution.code|default:'' }}" placeholder="e.g., MEC" style="text-transform:uppercase;"></div>
          <div class="col-md-6"><label class="form-label fw-medium">Contact Phone</label><input type="text" name="contact_phone" class="form-control" value="{{ institution.contact_phone|default:'' }}" placeholder="+91-0000000000"></div>
          <div class="col-md-6"><label class="form-label fw-medium">Contact Email</label><input type="email" name="contact_email" class="form-control" value="{{ institution.contact_email|default:'' }}" placeholder="admin@institution.edu"></div>
          <div class="col-md-6"><label class="form-label fw-medium">Established Date</label><input type="date" name="established_date" class="form-control" value="{{ institution.established_date|default:'' }}"></div>
          <div class="col-12"><label class="form-label fw-medium">Address</label><textarea name="address" class="form-control" rows="2" required placeholder="Full address...">{{ institution.address|default:'' }}</textarea></div>
          <div class="col-12"><label class="form-label fw-medium">Logo (Optional)</label><input type="file" name="logo" class="form-control" accept="image/*">{% if institution.logo %}<img src="{{ institution.logo.url }}" class="mt-2 rounded-2" height="60">{% endif %}</div>
        </div>
        <div class="d-flex gap-3 justify-content-end mt-4 pt-3 border-top">
          <a href="{% url 'institutions:institution_list' %}" class="btn btn-light rounded-pill px-4">Cancel</a>
          <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm">{{ title }}</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
