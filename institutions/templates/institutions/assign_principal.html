{% extends 'base_dashboard.html' %}
{% block title %}Assign Principal | CPAS{% endblock %}
{% block dashboard_content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="card border-0 shadow-sm rounded-4">
        <div class="card-header bg-white border-0 pt-4 px-4 pb-0">
          <h4 class="fw-bold mb-0"><i class="bi bi-buildings-fill text-warning me-2"></i>Assign Principal</h4>
          <p class="text-muted small mt-1">{{ institution.institution_name }} ({{ institution.institution_code }})</p>
        </div>
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Principal</label>
              <select name="principal" class="form-select rounded-3">
                <option value="">— Not Assigned —</option>
                {% for p in principals %}
                <option value="{{ p.pk }}" {% if institution.principal_id == p.pk %}selected{% endif %}>
                  {{ p.get_full_name }} ({{ p.email }})
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Vice Principal</label>
              <select name="vice_principal" class="form-select rounded-3">
                <option value="">— Not Assigned —</option>
                {% for p in principals %}
                <option value="{{ p.pk }}" {% if institution.vice_principal_id == p.pk %}selected{% endif %}>
                  {{ p.get_full_name }} ({{ p.email }})
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-warning text-white rounded-pill px-4 shadow-sm">
                <i class="bi bi-check-circle me-2"></i>Save Assignment
              </button>
              <a href="{% url 'institutions:institution_list' %}" class="btn btn-light border rounded-pill px-4">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
